<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
AFRAME.registerComponent('monke-physics', {
  init: function () {
    this.vel = new THREE.Vector3();
    this.lastHandPos = { l: new THREE.Vector3(), r: new THREE.Vector3() };
    this.gravity = -0.01; 
    this.bounce = 1.5;   // Adjust for "strength"
    this.friction = 0.95; // Higher = less sliding
  },
  tick: function (t, dt) {
    if (!dt) return;
    const rig = this.el.object3D;
    
    // 1. Apply Gravity & Velocity
    this.vel.y += this.gravity;
    this.vel.multiplyScalar(this.friction);
    rig.position.add(this.vel);

    // Simple Floor Collision
    if (rig.position.y < 0) { 
        rig.position.y = 0; 
        this.vel.y = 0; 
    }

    // 2. Hand Movement Logic
    ['left', 'right'].forEach(side => {
      const handEl = document.querySelector(`#${side}Hand`);
      if (!handEl) return;
      
      const hand = handEl.object3D;
      const curr = new THREE.Vector3();
      // Use local position so rig movement doesn't interfere
      curr.copy(hand.position); 
      
      const sideKey = side === 'left' ? 'l' : 'r';
      const lastPos = this.lastHandPos[sideKey];
      const dist = curr.distanceTo(lastPos);

      // Trigger push if hand moves down/fast near the "ground"
      // Adjust '0.5' to change how close to your feet you must hit
      if (dist > 0.01 && (curr.y + rig.position.y) < 0.5) {
         const delta = curr.clone().sub(lastPos);
         
         // Push rig in the OPPOSITE direction of the hand swing
         this.vel.x -= delta.x * this.bounce;
         this.vel.z -= delta.z * this.bounce;
         this.vel.y -= delta.y * this.bounce;
      }
      this.lastHandPos[sideKey].copy(curr);
    });
  }
});

    </script>
</head>
<body>
    <a-scene webxr="referenceSpaceType: local-floor">
        <a-entity id="rig" monke-physics>
            <a-camera></a-camera>
            <a-entity id="leftHand" oculus-touch-controls="hand: left"></a-entity>
            <a-entity id="rightHand" oculus-touch-controls="hand: right"></a-entity>
        </a-entity>
        
        <a-grid color="#444"></a-grid>
        <a-sky color="#87CEEB"></a-sky>
    </a-scene>
</body>
</html>
